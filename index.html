// 単一校（中高一貫・6年制）向け。20回生が2026年度に中1（1年生）。
// 学年と「在校生／卒業生」は現在の年度から自動計算され、毎年度くり上がる（＝毎年更新）。
var SCHOOL = { name: '〇〇中学・高等学校', baseKaisei: 20, baseYear: 2026 };
var GRADE_LABELS = { 1:'中1', 2:'中2', 3:'中3', 4:'高1', 5:'高2', 6:'高3' };
// 年度（4月始まり）。3月までは前年度扱い。
function schoolYear(d){ d = d || new Date(); return d.getMonth() >= 3 ? d.getFullYear() : d.getFullYear() - 1; }
// baseYear年度に baseKaisei回生 が1年生（中1）。回生が小さいほど上級生。
function gradeOf(kaisei, y){ if(y==null) y = schoolYear(); return 1 + (SCHOOL.baseKaisei - kaisei) + (y - SCHOOL.baseYear); }
function statusOf(kaisei, y){
  var g = gradeOf(kaisei, y);
  if(g < 1)  return { type:'future', grade:g };
  if(g <= 6) return { type:'current', grade:g, gradeLabel:GRADE_LABELS[g] };
  return { type:'grad', grade:g, years:g - 6 };
}
// 表示名: 在校生→「18回生（中3）」, 卒業生→「14回生（卒業生）」
function personName(kaisei, y){
  var s = statusOf(kaisei, y);
  if(s.type==='current') return kaisei + '回生（' + s.gradeLabel + '）';
  if(s.type==='grad')    return kaisei + '回生（卒業生）';
  return kaisei + '回生';
}
// サブ情報: 卒業生→「卒業N年目」, 在校生→学年ラベル
function personMeta(kaisei, y){
  var s = statusOf(kaisei, y);
  if(s.type==='grad')    return '卒業' + s.years + '年目';
  if(s.type==='current') return s.gradeLabel;
  return '';
}
// バッジ: 在校生／卒業生 を色分け
function personBadge(kaisei, y){
  var s = statusOf(kaisei, y);
  if(s.type==='grad') return { label:'卒業生', color:'#1f5fd0', bg:'#e8f1fe' };
  return { label:'在校生', color:'#0ea5a9', bg:'#d9f3ee' };
}

// ホーム実績を実データから自動集計（投稿・回答が増えるたびに反映）
function computeStats(){
  var cs = state.consultations;
  var total = cs.length;
  var answered = cs.filter(function(c){ return c.answers.length > 0; }).length;
  var rate = total ? Math.round(answered / total * 100) : 0;
  var replied = cs.filter(function(c){ return c.firstReplyHours != null; });
  var avg = replied.length ? replied.reduce(function(s,c){ return s + c.firstReplyHours; }, 0) / replied.length : 0;
  // 回答に参加した先輩（回生）のユニーク数 ＋ ログイン中ユーザー
  var set = {};
  cs.forEach(function(c){ c.answers.forEach(function(a){ if(a.kaisei != null) set[a.kaisei] = 1; }); });
  set[state.userKaisei] = 1;
  var senpai = Object.keys(set).length;
  return { total: total, rate: rate, avgHours: avg, senpai: senpai };
}

// Convert a relative-time label ("30分前" / "2時間前" / "1日前" / "たった今") to
// minutes-ago, so "新しい順" can sort by recency. Smaller = newer.
function timeRank(str){
  if(!str) return 1e9;
  if(str.indexOf('たった今')!==-1) return 0;
  var m = str.match(/(\d+)/); var n = m? parseInt(m[1],10) : 0;
  if(str.indexOf('日')!==-1) return n*1440;
  if(str.indexOf('時間')!==-1) return n*60;
  if(str.indexOf('分')!==-1) return n;
  return 1e9;
}

/* ---- Toast ---- */
function toast(msg){
  var root = document.getElementById('toast-root');
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'pointer-events:auto;background:#1b2942;color:#fff;font-size:13.5px;font-weight:700;padding:12px 20px;border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.28);opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s';
  root.appendChild(t);
  requestAnimationFrame(function(){ t.style.opacity='1'; t.style.transform='translateY(0)'; });
  setTimeout(function(){ t.style.opacity='0'; t.style.transform='translateY(8px)'; setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 220); }, 2200);
}

// Read fields via querySelector — `form.name` resolves to the form's own name
// property (a string), not the <input name="name">, so named access is unsafe.
function fieldVal(form, n){ var el = form.querySelector('[name="'+n+'"]'); return el ? el.value.trim() : ''; }
// 新規登録後のセットアップを開始
function startSetup(nick){
  state.loggedIn = true;
  state.setupStatus = null; state.setupGrade = null; state.setupGradKaisei = kaiseiFromGrade(6) - 1;
  state.setupUniv = ''; state.setupFaculty = ''; state.setupNick = nick || '';
  go('setup');
}
// セットアップ完了 → プロフィールを確定
function completeSetup(){
  if(state.setupStatus==='current'){
    if(!state.setupGrade){ toast('学年を選んでください'); return; }
    state.userKaisei = kaiseiFromGrade(state.setupGrade);
    state.userUniv = ''; state.userFaculty = '';
  } else if(state.setupStatus==='grad'){
    state.userKaisei = state.setupGradKaisei || (kaiseiFromGrade(6)-1);
    state.userUniv = (state.setupUniv||'').trim();
    state.userFaculty = (state.setupFaculty||'').trim();
  } else {
    toast('在校生・卒業生を選んでください'); return;
  }
  var nick = (state.setupNick||'').trim();
  state.userName = nick || (statusOf(state.userKaisei).type==='grad' ? '卒業生ユーザー' : '在校生ユーザー');
  go('mypage'); toast('プロフィールを作成しました');
}
function handleModalForm(kind, form){
  if(kind==='login'){
    state.loggedIn = true;
    closeModal(); toast('ログインしました'); go('mypage');
  } else if(kind==='signup'){
    var nick = fieldVal(form,'nick');
    closeModal(); toast('登録が完了しました'); startSetup(nick);
  } else if(kind==='profile'){
    var name = fieldVal(form,'name');
    if(name) state.userName = name;
    closeModal(); toast('プロフィールを更新しました'); render();
  } else if(kind==='qapost'){
    var qcat = fieldVal(form,'cat')||'shukatsu', qtitle = fieldVal(form,'title'), qbody = fieldVal(form,'body');
    if(!qtitle || !qbody) return;
    state.communityPosts.unshift({ id:'cp_'+Date.now(), group:qcat, category:qcat, title:qtitle, kaisei:state.userKaisei, univ:state.userUniv||'', body:qbody, likes:0, liked:false, replies:0, time:'たった今', you:true, bookmarked:false });
    state.qaCat='all'; state.qaStatus='all';
    closeModal(); toast('相談を投稿しました'); go('qa');
  } else if(kind==='outreach'){
    var title = fieldVal(form,'title'), body = fieldVal(form,'body');
    if(!title || !body) return;
    state.outreachPosts.unshift({ id:'o_'+Date.now(), kind:fieldVal(form,'kind')||'other', kaisei:state.userKaisei, univ:state.userUniv||'', title:title, body:body, deadline:fieldVal(form,'deadline'), responses:0, responded:false, time:'たった今', you:true });
    state.outreachFilter = 'all';
    closeModal(); toast('在校生に発信しました'); go('outreach');
  }
}

function go(s){ state.screen = s; state.menuOpen = false; if(s==='mypage') state.mypageTab = 'overview'; if(s==='community') state.communityGroup = null; render(); toTop(); }
function goSupport(section){
  state.screen = 'support'; state.menuOpen = false; render();
  if(section){ var el = document.getElementById('support-' + section); if(el){ el.scrollIntoView(); return; } }
  toTop();
}
function openDetail(id){ state.screen='detail'; state.selectedId=id; state.answering=false; state.answerText=''; render(); toTop(); }
function toggleLike(id){ var c=find(id); if(!c) return; c.liked=!c.liked; c.likes += c.liked?1:-1; render(); }
function toggleBookmark(id){ var c=find(id); if(!c) return; c.bookmarked=!c.bookmarked; render(); }
function toggleHelpful(a){ a.marked=!a.marked; a.helpful += a.marked?1:-1; render(); }
function confirmPost(){ if(state.pcat && state.ptitle.trim() && state.pbody.trim()){ state.pstep=2; render(); toTop(); } }
function submitAnswer(){
  var c=selectedC(); var t=state.answerText.trim();
  if(!c||!t) return;
  var wasEmpty = c.answers.length === 0;
  c.answers.unshift({ kaisei:state.userKaisei, time:'たった今', body:t, helpful:0, marked:false, you:true });
  c.nAnswers += 1;
  // 初回回答なら「返信までの時間」を記録（→ 回答率・平均返信時間に反映）
  if(wasEmpty && c.firstReplyHours == null){
    var hrs = (Date.now() - (c.postedAt || Date.now())) / 3600000;
    c.firstReplyHours = Math.max(0.1, Math.round(hrs * 10) / 10);
  }
  state.answering=false; state.answerText='';
  render();
}
// 投稿完了時に実際の相談として追加（→ 相談件数・回答率が順次反映）
function addUserConsultation(){
  var g = Math.max(1, Math.min(6, gradeOf(state.userKaisei)));
  var id = 'u_'+Date.now();
  state.consultations.unshift({
    id:id, grade:g, category:state.pcat, popular:false,
    title:state.ptitle.trim(), body:state.pbody.trim(),
    likes:0, nAnswers:0, time:'たった今', views:0,
    liked:false, bookmarked:false, firstReplyHours:null, postedAt:Date.now(),
    answers:[]
  });
  // cid でマイページの「自分の相談」から相談ページを開けるようにする
  state.myPosts.unshift({ cid:id, category:state.pcat, title:state.ptitle.trim(), nAnswers:0, time:'たった今', status:'回答受付中' });
}
function findCommunityPost(id){ for(var i=0;i<state.communityPosts.length;i++){ if(state.communityPosts[i].id===id) return state.communityPosts[i]; } return null; }
function findOutreach(id){ for(var i=0;i<state.outreachPosts.length;i++){ if(state.outreachPosts[i].id===id) return state.outreachPosts[i]; } return null; }
function submitCommunityPost(){
  if(statusOf(state.userKaisei).type!=='grad'){ toast('投稿できるのは卒業生のみです'); return; }
  var txt = (state.communityText||'').trim();
  if(!txt || !state.communityGroup) return;
  state.communityPosts.unshift({ id:'cp_'+Date.now(), group:state.communityGroup, kaisei:state.userKaisei, univ:state.userUniv||'', body:txt, likes:0, liked:false, replies:0, time:'たった今', you:true });
  state.communityText='';
  render(); toast('コミュニティに投稿しました');
}

function mobileMenuHTML(){
  if(!state.menuOpen) return '';
  function item(label, attr, active){
    return '<div '+attr+' style="display:flex;align-items:center;justify-content:space-between;padding:14px 4px;font-size:15px;font-weight:'+(active?700:500)+';color:'+(active?'#2f73e8':'#3a465f')+';border-bottom:1px solid #edf1f8;cursor:pointer">'+label+'<span style="color:#bcc6d6">›</span></div>';
  }
  var navDefs = [['ホーム','data-nav="home"','home'],['相談を探す','data-nav="browse"','browse'],['相談する','data-nav="post"','post'],['先輩の方へ','data-nav="alumni"','alumni'],['コミュニティ','data-nav="community"','community'],['お知らせ','data-nav="news"','news'],['使い方','data-nav="howto"','howto']];
  var items = navDefs.map(function(d){ return item(d[0], d[1], d[2] && state.screen===d[2]); }).join('');
  var actions;
  if(!state.loggedIn){
    actions = '<div style="display:flex;gap:12px;margin-top:16px">'

      + '<span data-auth="signup" style="flex:1;text-align:center;font-size:14px;font-weight:700;color:#3d2f06;background:#f5cb4d;padding:12px;border-radius:10px;cursor:pointer">新規登録</span></div>';
  } else {
    var unread = state.notifications.filter(function(n){return n.unread;}).length;
    actions = item('マイページ','data-nav="mypage"', state.screen==='mypage')
      + item('通知'+(unread?' ('+unread+')':''),'data-bell="1"', false)
      + item('ログアウト','data-logout="1"', false);
  }
  return '<div class="rs-mobile-menu rs-pad" style="padding:10px 28px 22px;border-bottom:1px solid #e7edf6;background:#fff">'+items+actions+'</div>';
}

/* ============ BROWSE ============ */
function browseFiltered(){
  var q = state.query.trim();
  var list = state.consultations.filter(function(c){
    var catOk = state.activeCat==='all' || c.category===state.activeCat;
    // grade filter uses the asker's grade AT POSTING (frozen — does not shift year to year)
    var gradeOk = state.activeGrade==='all' || c.grade===state.activeGrade;
    var qOk = q==='' || (c.title+c.body).indexOf(q)!==-1;
    return catOk && gradeOk && qOk;
  });
  if(state.browseSort==='popular') list = list.slice().sort(function(a,b){ return b.likes - a.likes; });
  else list = list.slice().sort(function(a,b){ return timeRank(a.time) - timeRank(b.time); });
  return list;
}

    return '<div style="text-align:center;padding:60px 0;color:#94a1b5;font-size:14px">該当する相談が見つかりませんでした。</div>';

    var m=cats[c.category];
    var likeColor=c.liked?'#e0568a':'#94a1b5';

  } else if(state.pstep===2){

      + '<button id="back-step" style="cursor:pointer;background:#fff;border:1.5px solid #d4dde9;color:#3a465f;font-weight:700;font-size:14px;padding:12px 28px;border-radius:10px">修正する</button>'
      + '<button id="submit-post" style="cursor:pointer;border:none;background:#2f73e8;color:#fff;font-weight:700;font-size:14px;padding:12px 34px;border-radius:10px">投稿する</button>'
      + '</div></div>';
  } else {
    body = '<div style="max-width:540px;margin:0 auto;text-align:center;background:#fff;border:1px solid #e7edf6;border-radius:16px;padding:48px 28px">'
      + '<div style="width:72px;height:72px;border-radius:50%;background:#e8f1fe;display:flex;align-items:center;justify-content:center;margin:0 auto">'+svg.check+'</div>'
      + '<h2 style="font-size:21px;font-weight:900;color:#1b2942;margin:20px 0 8px">投稿が完了しました！</h2>'
      + '<p style="font-size:13.5px;color:#5a6678;line-height:1.8;margin:0">先輩からの回答が届くと通知でお知らせします。<br>平均4時間で最初の回答が届いています。</p>'
      + '<div style="display:flex;justify-content:center;gap:14px;margin-top:28px">'
      + '<button id="browse-reset" style="cursor:pointer;background:#fff;border:1.5px solid #d4dde9;color:#3a465f;font-weight:700;font-size:14px;padding:12px 26px;border-radius:10px">相談一覧へ</button>'
      + '<button id="home-reset" style="cursor:pointer;border:none;background:#2f73e8;color:#fff;font-weight:700;font-size:14px;padding:12px 30px;border-radius:10px">ホームに戻る</button>'

  return '<main class="rs-pad" style="max-width:920px;margin:0 auto;padding:30px 28px 70px">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:24px"><span data-nav="home" style="cursor:pointer;color:#3a465f;display:inline-flex">'+svg.back+'</span><h1 style="margin:0;font-size:22px;font-weight:900;color:#1b2942">相談する</h1></div>'

}

/* ============ DETAIL ============ */
function detailHTML(){
  var c = selectedC();
  if(!c) return '<main style="max-width:840px;margin:0 auto;padding:30px 28px"></main>';
  var m=cats[c.category];
  var likeColor=c.liked?'#e0568a':'#94a1b5';
  var bmColor=c.bookmarked?'#2f73e8':'#bcc6d6';
  var bmFill=c.bookmarked?'#2f73e8':'none';

  // Sort answers without mutating original order (idx must still map back to c.answers)
  var ordered = c.answers.map(function(a,i){ return { a:a, i:i }; });
  if(state.answerSort==='helpful') ordered.sort(function(x,y){ return y.a.helpful - x.a.helpful; });
  else ordered.sort(function(x,y){ return timeRank(x.a.time) - timeRank(y.a.time); });
  var answers = ordered.map(function(o){
    var a=o.a, idx=o.i;
    var youBg=a.you?'#f2f7fd':'#fff';
    var helpfulColor=a.marked?'#2f73e8':'#94a1b5';
    var badge = personBadge(a.kaisei);
    var name = a.you ? 'あなた' : personName(a.kaisei);
    var metaLabel = personMeta(a.kaisei);
    var meta = metaLabel ? '<span style="font-size:11.5px;color:#9aa6ba">'+esc(metaLabel)+'</span>' : '';
    return '<div style="background:'+youBg+';border:1px solid #e7edf6;border-radius:14px;padding:18px 20px">'
      + '<div style="display:flex;align-items:center;gap:10px">'
      + '<svg width="34" height="34" viewBox="0 0 40 40" style="flex-shrink:0"><circle cx="20" cy="20" r="20" fill="#edf1f8"/><circle cx="20" cy="16" r="6.5" fill="#94a1b5"/><path d="M8 33c0-6 5.5-9 12-9s12 3 12 9z" fill="#94a1b5"/></svg>'
      + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:14px;font-weight:700;color:#1b2942">'+esc(name)+'</span><span style="font-size:10px;font-weight:700;color:'+badge.color+';background:'+badge.bg+';padding:2px 8px;border-radius:10px">'+badge.label+'</span>'+meta+'<span style="font-size:11.5px;color:#9aa6ba">'+a.time+'</span></div></div>'
      + '<p style="font-size:13.5px;color:#44516b;line-height:1.85;margin:12px 0 0">'+esc(a.body)+'</p>'
      + '<button data-helpful="'+idx+'" style="border:none;background:none;cursor:pointer;padding:0;margin-top:12px;display:inline-flex;align-items:center;gap:6px;color:'+helpfulColor+';font-size:12.5px;font-weight:700">'+heart(15)+a.helpful+' 役に立った</button>'
      + '</div>';
  }).join('');

  var answerBlock;
  if(state.answering){
    answerBlock = '<div style="background:#fff;border:1px solid #cfe0fb;border-radius:14px;padding:18px;margin-top:18px">'
      + '<div style="font-size:13px;font-weight:700;color:#1f5fd0;margin-bottom:10px">先輩としてアドバイスする</div>'
      + '<textarea id="answer-text" placeholder="あなたの経験をもとにアドバイスを書きましょう" style="width:100%;height:110px;border:1.5px solid #dde4f1;border-radius:10px;padding:12px 14px;font-size:14px;color:#1b2942;line-height:1.7;outline:none">'+esc(state.answerText)+'</textarea>'
      + '<div style="display:flex;justify-content:flex-end;gap:12px;margin-top:12px">'
      + '<button id="cancel-answer" style="cursor:pointer;background:#fff;border:1.5px solid #d4dde9;color:#3a465f;font-weight:700;font-size:13.5px;padding:10px 22px;border-radius:10px">キャンセル</button>'
      + '<button id="submit-answer" style="cursor:pointer;border:none;background:#2f73e8;color:#fff;font-weight:700;font-size:13.5px;padding:10px 26px;border-radius:10px">回答を投稿</button>'
      + '</div></div>';
  } else {
    answerBlock = '<button id="open-answer" style="width:100%;margin-top:20px;cursor:pointer;border:none;background:#2f73e8;color:#fff;font-weight:700;font-size:15px;padding:16px;border-radius:14px">回答する（先輩としてアドバイスする）</button>';
  }

  return '<main class="rs-pad" style="max-width:840px;margin:0 auto;padding:30px 28px 70px">'
    + '<span data-nav="browse" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#5a6678;cursor:pointer;margin-bottom:18px">'+svg.backSm+'一覧に戻る</span>'
    + '<div style="background:#fff;border:1px solid #e7edf6;border-radius:16px;padding:26px 28px">'
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start">'
    + '<span style="display:inline-block;font-size:12px;font-weight:700;padding:4px 11px;border-radius:7px;background:'+m.bg+';color:'+m.color+'">'+m.label+'</span>'
    + '<button data-bookmark="'+c.id+'" style="border:none;background:none;cursor:pointer;padding:0">'+bookmark(18,21,bmFill,bmColor)+'</button></div>'
    + '<h1 style="font-size:24px;font-weight:900;color:#1b2942;margin:14px 0 12px">'+esc(c.title)+'</h1>'
    + '<p style="font-size:14.5px;color:#3a465f;line-height:1.9;margin:0">'+esc(c.body)+'</p>'
    + '<div style="display:flex;align-items:center;gap:20px;margin-top:18px;font-size:13px;color:#94a1b5;padding-top:16px;border-top:1px solid #edf1f8">'
    + '<button data-like="'+c.id+'" style="border:none;background:none;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:6px;color:'+likeColor+';font-size:13px">'+heart(16)+c.likes+'</button>'
    + '<span style="display:inline-flex;align-items:center;gap:6px">'+chat(16)+c.nAnswers+'</span>'
    + '<span>閲覧数 '+c.views+'</span><span>'+c.time+'</span></div></div>'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin:26px 2px 14px"><h2 style="margin:0;font-size:17px;font-weight:700;color:#1b2942">先輩の回答（'+c.answers.length+'件）</h2><span data-answer-sort="1" style="font-size:12.5px;color:#66738c;cursor:pointer">'+(state.answerSort==='helpful'?'役に立った順':'新しい順')+' ⌄</span></div>'
    + '<div style="display:flex;flex-direction:column;gap:14px">'+answers+'</div>'
    + answerBlock
    + '</main>';
}

/* ============ MYPAGE ============ */
// マイページの実績を実データから集計
function computeMyStats(){
  var posts = state.myPosts.length, ans = 0, helpful = 0;
  state.consultations.forEach(function(c){ c.answers.forEach(function(a){ if(a.you){ ans++; helpful += a.helpful; } }); });
  return { posts: posts, answers: ans, helpful: helpful };
}
function mypageHTML(){
  var tab = state.mypageTab || 'overview';
  var ms = computeMyStats();
  var unread = state.notifications.filter(function(n){return n.unread;}).length;
  var mpEmpty = function(msg){ return '<div style="text-align:center;padding:34px 0;color:#9aa6ba;font-size:13px">'+msg+'</div>'; };

  // ---- sidebar ----
  var icons = {

    posts:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 0 1-11.7 7.7L3 21l1.9-6.1A8.4 8.4 0 1 1 21 11.5z"/></svg>',

    settings:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.3l2-1.6-2-3.4-2.4 1a7 7 0 0 0-2.2-1.3L14 2h-4l-.3 2.4a7 7 0 0 0-2.2 1.3l-2.4-1-2 3.4 2 1.6A7 7 0 0 0 5 12c0 .4 0 .9.1 1.3l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 2.2 1.3L10 22h4l.3-2.4a7 7 0 0 0 2.2-1.3l2.4 1 2-3.4-2-1.6c.1-.4.1-.9.1-1.3z"/></svg>',
    logout:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>'
  };
  function sideItem(key,label,badge){

    return '<div data-mytab="'+key+'" style="display:flex;align-items:center;gap:10px;font-size:13.5px;color:#3a465f;padding:11px 14px;cursor:pointer;border-radius:10px">'+icons[key]+label+b+'</div>';
  }

    + sideItem('posts','自分の相談')
    + sideItem('bookmarks','ブックマーク')
    + sideItem('notifications','通知', unread||'')
    + sideItem('settings','プロフィール設定')
    + '<div data-logout="1" style="display:flex;align-items:center;gap:10px;font-size:13.5px;color:#3a465f;padding:11px 14px;cursor:pointer;border-radius:10px">'+icons.logout+'ログアウト</div>';

  // ---- profile card ----
  var pb = personBadge(state.userKaisei);
  var profile = '<div class="rs-stack-sm" style="background:#fff;border:1px solid #e7edf6;border-radius:16px;padding:22px;display:flex;align-items:center;justify-content:space-between;gap:14px">'
    + '<div style="display:flex;align-items:center;gap:16px"><div style="width:58px;height:58px;border-radius:50%;background:#e8f1fe;display:flex;align-items:center;justify-content:center"><svg width="34" height="34" viewBox="0 0 40 40"><circle cx="20" cy="16" r="7" fill="#2f73e8"/><path d="M7 35c0-7 6-10 13-10s13 3 13 10z" fill="#2f73e8"/></svg></div>'
    + '<div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:17px;font-weight:700;color:#1b2942">'+esc(state.userName)+'</span><span style="font-size:11px;font-weight:700;color:'+pb.color+';background:'+pb.bg+';padding:2px 9px;border-radius:10px">'+esc(personName(state.userKaisei))+'</span></div>'
    + (state.userUniv ? '<div style="font-size:12px;color:#66738c;margin-top:3px">'+esc(state.userUniv)+(state.userFaculty?' '+esc(state.userFaculty):'')+'</div>' : '')
    + '<div style="font-size:12.5px;color:#66738c;margin-top:4px">相談 <b style="color:#1b2942">'+ms.posts+'</b>件 ・ 回答 <b style="color:#1b2942">'+ms.answers+'</b>件 ・ 役に立った <b style="color:#1b2942">'+ms.helpful+'</b></div></div></div>'
    + '<button data-mytab="settings" style="cursor:pointer;background:#fff;border:1.5px solid #d4dde9;color:#3a465f;font-weight:700;font-size:12.5px;padding:9px 16px;border-radius:10px;display:inline-flex;align-items:center;gap:7px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v16h16v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>プロフィール編集</button></div>';

  // ---- card builders ----
  function postCard(p,pi){
    var m=cats[p.category];
    var statusColor = p.status==='解決済み' ? '#2f73e8':'#e0892a';
    var openAttr = p.cid ? 'data-open="'+p.cid+'"' : 'data-mypost="'+pi+'"';
    return '<div '+openAttr+' style="background:#fff;border:1px solid #e7edf6;border-radius:13px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer">'
      + '<div><span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:'+m.color+'"><span style="width:14px;height:14px;border-radius:4px;background:'+m.bg+'"></span>'+m.label+'</span>'
      + '<div style="font-size:15px;font-weight:700;color:#1b2942;margin:8px 0 5px">'+esc(p.title)+'</div>'
      + '<div style="font-size:11.5px;color:#9aa6ba">回答 '+p.nAnswers+'件 ・ '+p.time+'</div></div>'
      + '<span style="font-size:12px;font-weight:700;color:'+statusColor+';white-space:nowrap">'+p.status+' ›</span></div>';
  }
  function postsList(limit){
    if(state.myPosts.length===0) return mpEmpty('まだ相談を投稿していません。「相談する」から投稿してみましょう。');
    var arr = limit ? state.myPosts.slice(0,limit) : state.myPosts;
    return arr.map(function(p,i){ return postCard(p,i); }).join('');
  }
  function bmCard(c){

    return '<div data-open="'+c.id+'" style="background:#fff;border:1px solid #e7edf6;border-radius:13px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer">'
      + '<div><span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:'+m.color+'"><span style="width:14px;height:14px;border-radius:4px;background:'+m.bg+'"></span>'+m.label+'</span>'
      + '<div style="font-size:15px;font-weight:700;color:#1b2942;margin:8px 0 5px">'+esc(c.title)+'</div>'
      + '<div style="font-size:11.5px;color:#9aa6ba">回答 '+c.nAnswers+'件 ・ '+c.time+'</div></div>'
      + '<button data-bookmark="'+c.id+'" style="border:none;background:none;cursor:pointer;padding:0">'+bookmark(17,20,'#2f73e8','#2f73e8')+'</button></div>';
  }
  function bmList(limit){
    var bms = state.consultations.filter(function(c){return c.bookmarked;});
    if(bms.length===0) return mpEmpty('ブックマークした相談はまだありません。');
    var arr = limit ? bms.slice(0,limit) : bms;
    return arr.map(bmCard).join('');
  }
  function blockHead(title, tabKey, count){
    return '<div style="display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px"><h3 style="margin:0;font-size:15px;font-weight:800;color:#1b2942">'+title+(count!=null?' <span style="color:#9aa6ba;font-weight:700">'+count+'</span>':'')+'</h3>'
      + (tabKey?'<span data-mytab="'+tabKey+'" style="font-size:12.5px;font-weight:700;color:#2f73e8;cursor:pointer">すべて見る ›</span>':'')+'</div>';

  function notifsInline(){
    var head = '<div style="display:flex;align-items:center;justify-content:space-between;margin:6px 0 14px"><h3 style="margin:0;font-size:16px;font-weight:900;color:#1b2942">通知'+(unread?' <span class="num" style="font-size:12px;color:#fff;background:#e0568a;padding:1px 8px;border-radius:10px;margin-left:4px">'+unread+'</span>':'')+'</h3>'+(unread?'<span data-notif-read="all" style="font-size:12.5px;font-weight:700;color:#2f73e8;cursor:pointer">すべて既読</span>':'')+'</div>';

  return list;

// スクロールで表示領域に入った .reveal 要素をふわっと出す
var _revObserver = null;
function observeReveals(){
  var els = document.querySelectorAll('.reveal:not(.reveal-in)');
  if(typeof IntersectionObserver === 'undefined'){ els.forEach(function(el){ el.classList.add('reveal-in'); }); return; }
  if(!_revObserver){
    _revObserver = new IntersectionObserver(function(entries){
      entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add('reveal-in'); _revObserver.unobserve(en.target); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
  }
  els.forEach(function(el){ _revObserver.observe(el); });
}
function render(){
  var app = document.getElementById('app');
  app.innerHTML = '<div style="min-height:100vh;background:#f4f8ff">' + headerHTML() + screenHTML() + '</div>' + fabHTML();
  wire();
  observeReveals();
}

function on(sel,evt,fn){ var n=document.getElementById(sel); if(n) n.addEventListener(evt,fn); }

// Attach the delegated click listener once on document.body — it must cover both
// #app and #modal-root (modals live outside #app). Attaching once avoids stacking
// handlers across re-renders, which would fire toggles multiple times.
function setupDelegation(){
  document.body.addEventListener('click', function(e){
    var t = e.target.closest('[data-nav],[data-open],[data-like],[data-bookmark],[data-chip],[data-grade],[data-helpful],[data-auth],[data-google],[data-info],[data-support],[data-legal],[data-mytab],[data-setup-status],[data-setup-grade],[data-setup-done],[data-setup-skip],[data-community-open],[data-community-back],[data-community-like],[data-community-post],[data-cm-filter],[data-cm-setsort],[data-cm-sort],[data-cm-feedtab],[data-cm-follow],[data-cm-post],[data-cm-bookmark],[data-community-feed-open],[data-news-filter],[data-news-page],[data-news-pref],[data-qa-cat],[data-qa-status],[data-qa-follow],[data-qa-reset],[data-qa-post],[data-toast],[data-outreach-new],[data-outreach-respond],[data-outreach-filter],[data-bell],[data-sns],[data-browse-sort],[data-browse-more],[data-answer-sort],[data-scroll],[data-profile],[data-logout],[data-mypost],[data-more-toast],[data-notif],[data-notif-read],[data-menu]');
    if(!t) return;
    if(t.hasAttribute('data-like') || t.hasAttribute('data-bookmark') || t.hasAttribute('data-helpful')) e.stopPropagation();

    // Actions that open a modal should first close the mobile menu if it's open.
    function closeMenu(){ if(state.menuOpen){ state.menuOpen = false; render(); } }

    if(t.hasAttribute('data-menu')){ state.menuOpen = !state.menuOpen; render(); return; }
    if(t.hasAttribute('data-nav')) return go(t.getAttribute('data-nav'));
    if(t.hasAttribute('data-open')) return openDetail(t.getAttribute('data-open'));
    if(t.hasAttribute('data-like')) return toggleLike(t.getAttribute('data-like'));
    if(t.hasAttribute('data-bookmark')) return toggleBookmark(t.getAttribute('data-bookmark'));
    if(t.hasAttribute('data-helpful')){ var c=selectedC(); if(c){ var a=c.answers[+t.getAttribute('data-helpful')]; if(a) toggleHelpful(a); } return; }
    if(t.hasAttribute('data-chip')){ state.activeCat = t.getAttribute('data-chip'); state.browseLimit = 4; render(); return; }
    if(t.hasAttribute('data-grade')){ var gv=t.getAttribute('data-grade'); state.activeGrade = gv==='all'?'all':parseInt(gv,10); state.browseLimit = 4; render(); return; }
    if(t.hasAttribute('data-auth')){ closeMenu(); return openModal(authModal(t.getAttribute('data-auth')), 420); }
    if(t.hasAttribute('data-google')){
      // デモ: 実際のGoogle認証（Google Identity Services）はバックエンドとOAuthクライアントIDが必要。
      // ここではログイン成功として扱う。
      var wasSignup = t.getAttribute('data-google')==='signup';
      closeMenu(); closeModal();
      if(wasSignup){ toast('Googleで登録しました'); startSetup(''); }
      else { state.loggedIn = true; toast('Googleでログインしました'); go('mypage'); }
      return;
    }
    if(t.hasAttribute('data-info')){ closeMenu(); return infoModal(t.getAttribute('data-info')); }
    if(t.hasAttribute('data-support')) return goSupport(t.getAttribute('data-support'));
    if(t.hasAttribute('data-legal')){ closeMenu(); return go(t.getAttribute('data-legal')); }
    if(t.hasAttribute('data-mytab')){ state.mypageTab = t.getAttribute('data-mytab'); render(); toTop(); return; }
    if(t.hasAttribute('data-setup-status')){ state.setupStatus = t.getAttribute('data-setup-status'); if(state.setupStatus==='grad' && state.setupGradKaisei==null) state.setupGradKaisei = kaiseiFromGrade(6)-1; render(); return; }
    if(t.hasAttribute('data-setup-grade')){ state.setupGrade = parseInt(t.getAttribute('data-setup-grade'),10); render(); return; }
    if(t.hasAttribute('data-setup-skip')){ toast('プロフィールはマイページからいつでも設定できます'); go('mypage'); return; }
    if(t.hasAttribute('data-setup-done')){ completeSetup(); return; }
    if(t.hasAttribute('data-community-open')){ state.communityGroup = t.getAttribute('data-community-open'); state.communityText=''; render(); toTop(); return; }
    if(t.hasAttribute('data-community-back')){ state.communityGroup = null; render(); toTop(); return; }
    if(t.hasAttribute('data-community-like')){ var cp=findCommunityPost(t.getAttribute('data-community-like')); if(cp){ cp.liked=!cp.liked; cp.likes+=cp.liked?1:-1; render(); } return; }
    if(t.hasAttribute('data-community-post')){ submitCommunityPost(); return; }
    if(t.hasAttribute('data-cm-filter')){ state.communityFilter = t.getAttribute('data-cm-filter'); render(); return; }
    if(t.hasAttribute('data-cm-setsort')){ state.communitySort = t.getAttribute('data-cm-setsort'); render(); return; }
    if(t.hasAttribute('data-cm-sort')){ state.communitySort = state.communitySort==='new' ? 'popular' : 'new'; render(); return; }
    if(t.hasAttribute('data-cm-feedtab')){ state.communityFeedTab = t.getAttribute('data-cm-feedtab'); render(); return; }
    if(t.hasAttribute('data-cm-follow')){ var uid=t.getAttribute('data-cm-follow'); state.followedUsers[uid] = !state.followedUsers[uid]; render(); return; }
    if(t.hasAttribute('data-cm-post')){
      if(statusOf(state.userKaisei).type!=='grad'){ toast('投稿できるのは卒業生のみです'); return; }
      var txt=(state.communityText||'').trim(); if(!txt) return;
      var cat = state.communityFilter!=='all' ? state.communityFilter : 'shukatsu';
      state.communityPosts.unshift({ id:'cp_'+Date.now(), group:cat, category:cat, title:txt.length>28?txt.slice(0,28)+'…':txt, kaisei:state.userKaisei, univ:state.userUniv||'', body:txt, likes:0, liked:false, replies:0, time:'たった今', you:true, bookmarked:false });
      state.communityText=''; render(); toast('コミュニティに投稿しました'); return;
    }
    if(t.hasAttribute('data-cm-bookmark')){ var cp2=findCommunityPost(t.getAttribute('data-cm-bookmark')); if(cp2){ cp2.bookmarked=!cp2.bookmarked; render(); toast(cp2.bookmarked?'ブックマークしました':'ブックマークを解除しました'); } return; }
    if(t.hasAttribute('data-community-feed-open')){ return; }
    if(t.hasAttribute('data-news-filter')){ state.newsFilter = t.getAttribute('data-news-filter'); state.newsPage = 1; render(); return; }
    if(t.hasAttribute('data-news-page')){ state.newsPage = parseInt(t.getAttribute('data-news-page'),10)||1; render(); return; }
    if(t.hasAttribute('data-news-pref')){ var pk=t.getAttribute('data-news-pref'); state.newsPrefs[pk]=!state.newsPrefs[pk]; render(); return; }
    if(t.hasAttribute('data-qa-cat')){ state.activeCat = t.getAttribute('data-qa-cat'); render(); return; }
    if(t.hasAttribute('data-qa-status')){ state.browseStatus = t.getAttribute('data-qa-status'); render(); return; }
    if(t.hasAttribute('data-qa-follow')){ state.browseBmOnly = !state.browseBmOnly; render(); return; }
    if(t.hasAttribute('data-qa-reset')){ state.activeCat='all'; state.activeGrade='all'; state.browseSort='new'; state.browseStatus='all'; state.browseBmOnly=false; state.query=''; render(); return; }
    if(t.hasAttribute('data-toast')){ return toast(t.getAttribute('data-toast')); }
    if(t.hasAttribute('data-outreach-filter')){ state.outreachFilter = t.getAttribute('data-outreach-filter'); render(); return; }
    if(t.hasAttribute('data-outreach-new')){ if(statusOf(state.userKaisei).type!=='grad'){ toast('発信できるのは卒業生のみです'); return; } return openModal(outreachModal(), 460); }
    if(t.hasAttribute('data-outreach-respond')){ var op=findOutreach(t.getAttribute('data-outreach-respond')); if(op){ op.responded=!op.responded; op.responses+=op.responded?1:-1; render(); if(op.responded) toast('先輩に反応を送りました'); } return; }
    if(t.hasAttribute('data-bell')){ closeMenu(); return openModal(notificationsModal(), 420); }
    if(t.hasAttribute('data-sns')) return toast(t.getAttribute('data-sns') + ' は準備中です');
    if(t.hasAttribute('data-browse-sort')){ state.browseSort = state.browseSort==='new'?'popular':'new'; state.browseLimit = 4; render(); return; }
    if(t.hasAttribute('data-browse-more')){ state.browseLimit += 4; render(); return; }
    if(t.hasAttribute('data-answer-sort')){ state.answerSort = state.answerSort==='new'?'helpful':'new'; render(); return; }
    if(t.hasAttribute('data-scroll')){ var el=document.getElementById(t.getAttribute('data-scroll')); if(el) el.scrollIntoView({behavior:'smooth'}); return; }
    if(t.hasAttribute('data-profile')) return openModal(profileModal(), 420);
    if(t.hasAttribute('data-logout')){ state.loggedIn = false; closeModal(); toast('ログアウトしました'); go('home'); return; }
    if(t.hasAttribute('data-mypost')){ var p=state.myPosts[+t.getAttribute('data-mypost')]; if(p) toast('「'+p.title+'」（'+p.status+'）'); return; }
    if(t.hasAttribute('data-more-toast')) return toast('これ以上の項目はありません');
    if(t.hasAttribute('data-notif')){ var n=findNotif(t.getAttribute('data-notif')); if(n){ n.unread=false; closeModal(); render(); } return; }
    if(t.hasAttribute('data-notif-read')){ state.notifications.forEach(function(n){ n.unread=false; }); closeModal(); render(); toast('すべて既読にしました'); return; }
  });
}

function wire(){
  // Per-render listeners below target fresh elements (innerHTML was replaced),
  // so old listeners are discarded with their nodes — safe to re-add each render.

  // Browse search (live filter, preserve focus)
  on('search-input','input', function(e){
    state.query = e.target.value;
    state.browseLimit = 4;
    var list = document.getElementById('browse-list');
    if(list) list.innerHTML = browseListHTML();
    var more = document.getElementById('browse-more');
    if(more) more.outerHTML = browseMoreHTML();
  });

  // Post form — update silently to keep caret position
  on('p-cat','change', function(e){
    state.pcat = e.target.value;
    var btn = document.getElementById('confirm-post');
    if(btn) btn.style.background = postValid()?'#2f73e8':'#b6cdf3';
  });
  on('p-title','input', function(e){
    state.ptitle = e.target.value.slice(0,30);
    if(e.target.value.length>30) e.target.value = state.ptitle;
    var c=document.getElementById('title-count'); if(c) c.textContent = state.ptitle.length;
    var btn=document.getElementById('confirm-post'); if(btn) btn.style.background = postValid()?'#2f73e8':'#b6cdf3';
  });
  on('p-body','input', function(e){
    state.pbody = e.target.value.slice(0,1000);
    if(e.target.value.length>1000) e.target.value = state.pbody;
    var c=document.getElementById('body-count'); if(c) c.textContent = state.pbody.length;
    var btn=document.getElementById('confirm-post'); if(btn) btn.style.background = postValid()?'#2f73e8':'#b6cdf3';
  });
  on('confirm-post','click', confirmPost);
  on('back-step','click', function(){ state.pstep=1; render(); toTop(); });
  on('submit-post','click', function(){ addUserConsultation(); state.pstep=3; render(); toTop(); });

  // マイページ プロフィール設定 保存
  on('mp-save','click', function(){
    var nm = document.getElementById('mp-name'), kk = document.getElementById('mp-kaisei');
    if(nm && nm.value.trim()) state.userName = nm.value.trim();
    if(kk) state.userKaisei = parseInt(kk.value, 10);
    render(); toast('プロフィールを更新しました');
  });

  // Setup (new-user profile) — text inputs update state silently to keep focus
  on('setup-univ','input', function(e){ state.setupUniv = e.target.value; });
  on('setup-faculty','input', function(e){ state.setupFaculty = e.target.value; });
  on('setup-nick','input', function(e){ state.setupNick = e.target.value; });
  on('setup-gradyear','change', function(e){ state.setupGradKaisei = parseInt(e.target.value, 10); });

  // Community composer
  on('community-text','input', function(e){ state.communityText = e.target.value; });

  // みんなの相談: live search + filter selects
  on('qa-search','input', function(e){ state.query = e.target.value; var l=document.getElementById('qa-list'); if(l) l.innerHTML = browseNewListHTML(); });
  on('qa-status-sel','change', function(e){ state.browseStatus = e.target.value; render(); });
  on('qa-sort-sel','change', function(e){ state.browseSort = e.target.value; render(); });
  on('qa-grade-sel','change', function(e){ var v=e.target.value; state.activeGrade = v==='all'?'all':parseInt(v,10); render(); });

  // Support contact form
  on('sp-send','click', function(){
    var msg = document.getElementById('sp-msg');
    if(!msg || !msg.value.trim()){ toast('お問い合わせ内容をご入力ください'); if(msg) msg.focus(); return; }
    document.getElementById('sp-msg').value = '';
    var em = document.getElementById('sp-email'); if(em) em.value = '';
    toast('お問い合わせを送信しました。ありがとうございます。');
  });
  on('browse-reset','click', function(){ state.pstep=1; state.pcat=''; state.ptitle=''; state.pbody=''; go('browse'); });
  on('home-reset','click', function(){ state.pstep=1; state.pcat=''; state.ptitle=''; state.pbody=''; go('home'); });

  // Detail answer
  on('open-answer','click', function(){ state.answering=true; render(); });
  on('cancel-answer','click', function(){ state.answering=false; state.answerText=''; render(); });
  on('answer-text','input', function(e){ state.answerText = e.target.value; });
  on('submit-answer','click', submitAnswer);
}
function postValid(){ return !!(state.pcat && state.ptitle.trim() && state.pbody.trim()); }

/* ============ BOOT ============ */
setupDelegation();
render();

})();

</script>
<script>
// Loading splash: play the animation, then fade out and remove.
(function(){
  var sp = document.getElementById('splash');
  if(!sp) return;
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var MIN = reduce ? 400 : 2000;
  var start = Date.now();
  var done = false;
  function hide(){
    if(done) return; done = true;
    sp.classList.add('sp-hide');
    setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); }, 650);
  }
  window.addEventListener('load', function(){
    setTimeout(hide, Math.max(0, MIN - (Date.now() - start)));
  });
  setTimeout(hide, MIN + 900); // fallback in case 'load' already fired
})();
</script>
